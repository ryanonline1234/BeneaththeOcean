; Minimal export_presets.cfg example for Godot 4 (HTML5 preset)
; Paste this into your project root. Edit the fields in the Godot editor as needed.
; Note: Godot's editor manages this file automatically; this is a starter template.

[preset.0]
name="HTML5"
platform="Web/HTML5"
custom_features=[]
runnable=true
export_path="export/html5"
include_filter="res://"
export_filter="all_resources"
release=false

; For HTML5 you still need to install Godot export templates via the editor (Project->Install Export Templates).
